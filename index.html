<!DOCTYPE html>
<html lang="es" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Audit Pro - Interacción Selectiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        /* Lógica Avanzada de Chips: Solo se activa si UN hijo está hovered */
        .chip-group:has(.chip:hover) .chip:not(:hover) {
            transform: scale(0.85);
            opacity: 0.3;
            filter: blur(1px) grayscale(0.8);
        }
        
        .chip {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform, opacity;
        }

        .chip:hover {
            transform: scale(1.2) !important;
            opacity: 1 !important;
            filter: blur(0) grayscale(0) !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            z-index: 20;
        }

        /* Suavizado de la transición de modo oscuro */
        body { transition: background-color 0.5s ease, color 0.5s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black tracking-tighter uppercase italic">
                    <span class="text-blue-600">Pure</span>Audit
                </h1>
                <p class="text-slate-500 dark:text-slate-400 text-[10px] font-black tracking-[0.3em] uppercase">Intelligence Terminal</p>
            </div>
            <button onclick="toggleDarkMode()" class="group p-3 rounded-2xl bg-white dark:bg-darkCard shadow-sm hover:shadow-blue-500/20 transition-all border border-slate-200 dark:border-slate-800">
                <span id="theme-icon" class="text-xl group-hover:rotate-12 block transition-transform">🌙</span>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 space-y-6">
                <div class="bg-white dark:bg-darkCard p-7 rounded-[2.5rem] shadow-2xl shadow-slate-200/60 dark:shadow-none border border-slate-100 dark:border-slate-800/50">
                    <h2 class="text-[11px] font-black uppercase tracking-widest text-slate-400 mb-8 flex items-center">
                        <span class="w-3 h-[2px] bg-blue-600 mr-2"></span> Data Entry
                    </h2>
                    
                    <div class="space-y-9">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-400 mb-3 ml-1">Capital Inicial ($)</label>
                            <input type="number" id="montoInicial" value="185" class="w-full bg-slate-50 dark:bg-darkBg/50 p-4 rounded-2xl border border-transparent focus:border-blue-500/50 focus:ring-0 text-3xl font-black transition-all">
                            
                            <div class="flex flex-wrap gap-2 mt-5 chip-group">
                                <button onclick="adjust('montoInicial', -100)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-red-50 text-red-500 dark:bg-red-500/10 dark:text-red-400 border border-red-100 dark:border-red-500/20">-100</button>
                                <button onclick="adjust('montoInicial', -50)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-red-50 text-red-500 dark:bg-red-500/10 dark:text-red-400 border border-red-100 dark:border-red-500/20">-50</button>
                                <button onclick="adjust('montoInicial', -20)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-red-50 text-red-500 dark:bg-red-500/10 dark:text-red-400 border border-red-100 dark:border-red-500/20">-20</button>
                                <button onclick="adjust('montoInicial', 20)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-emerald-50 text-emerald-500 dark:bg-emerald-500/10 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-500/20">+20</button>
                                <button onclick="adjust('montoInicial', 50)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-emerald-50 text-emerald-500 dark:bg-emerald-500/10 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-500/20">+50</button>
                                <button onclick="adjust('montoInicial', 100)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-emerald-50 text-emerald-500 dark:bg-emerald-500/10 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-500/20">+100</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-400 mb-3 ml-1">Aporte Mensual ($)</label>
                            <input type="number" id="aporteMensual" value="0" class="w-full bg-slate-50 dark:bg-darkBg/50 p-4 rounded-2xl border border-transparent focus:border-blue-500/50 focus:ring-0 text-3xl font-black transition-all">
                            
                            <div class="flex flex-wrap gap-2 mt-5 chip-group">
                                <button onclick="adjust('aporteMensual', -100)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-red-50 text-red-500 dark:bg-red-500/10 dark:text-red-400 border border-red-100 dark:border-red-500/20">-100</button>
                                <button onclick="adjust('aporteMensual', -50)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-red-50 text-red-500 dark:bg-red-500/10 dark:text-red-400 border border-red-100 dark:border-red-500/20">-50</button>
                                <button onclick="adjust('aporteMensual', -20)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-red-50 text-red-500 dark:bg-red-500/10 dark:text-red-400 border border-red-100 dark:border-red-500/20">-20</button>
                                <button onclick="adjust('aporteMensual', 20)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-blue-50 text-blue-500 dark:bg-blue-500/10 dark:text-blue-400 border border-blue-100 dark:border-blue-500/20">+20</button>
                                <button onclick="adjust('aporteMensual', 50)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-blue-50 text-blue-500 dark:bg-blue-500/10 dark:text-blue-400 border border-blue-100 dark:border-blue-500/20">+50</button>
                                <button onclick="adjust('aporteMensual', 100)" class="chip px-3 py-1.5 text-[10px] font-black rounded-lg bg-blue-50 text-blue-500 dark:bg-blue-500/10 dark:text-blue-400 border border-blue-100 dark:border-blue-500/20">+100</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 pt-4">
                            <div class="bg-slate-50 dark:bg-darkBg/50 p-4 rounded-2xl">
                                <label class="block text-[9px] font-black uppercase text-blue-500 mb-1">E1 Anual</label>
                                <input type="number" step="0.1" id="interes1" value="0.1" class="w-full bg-transparent border-none p-0 font-black text-xl">
                            </div>
                            <div class="bg-slate-50 dark:bg-darkBg/50 p-4 rounded-2xl">
                                <label class="block text-[9px] font-black uppercase text-emerald-500 mb-1">E2 Anual</label>
                                <input type="number" step="0.1" id="interes2" value="3.0" class="w-full bg-transparent border-none p-0 font-black text-xl">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black uppercase text-slate-400 mb-3 ml-1">Desde</label>
                                <input type="date" id="fechaInicio" onchange="calcular()" class="w-full bg-slate-50 dark:bg-darkBg/50 p-4 rounded-xl border border-transparent focus:border-blue-500/50 focus:ring-0 text-sm font-bold transition-all text-slate-700 dark:text-slate-300">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase text-slate-400 mb-3 ml-1">Hasta</label>
                                <input type="date" id="fechaFin" onchange="calcular()" class="w-full bg-slate-50 dark:bg-darkBg/50 p-4 rounded-xl border border-transparent focus:border-blue-500/50 focus:ring-0 text-sm font-bold transition-all text-slate-700 dark:text-slate-300">
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-8 space-y-6">
                

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="group">
                        <div class="bg-white dark:bg-darkCard p-8 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none transition-all hover:border-blue-500/30">
                            <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Escenario Conservador</p>
                            <h2 class="text-5xl font-black text-slate-800 dark:text-white" id="resumen1">$0.00</h2>
                            
                            <div class="mt-8 pt-6 border-t border-slate-50 dark:border-slate-800 flex justify-between items-center">
                                <span class="text-[10px] font-black uppercase text-slate-400">Rendimiento Neto</span>
                                <span class="text-xl font-black text-blue-500" id="ganancia1">+$0.00</span>
                            </div>
                        </div>
                    </div>

                    <div class="group">
                        <div class="bg-white dark:bg-darkCard p-8 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none transition-all hover:border-emerald-500/30">
                            <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Escenario Optimizado</p>
                            <h2 class="text-5xl font-black text-slate-800 dark:text-white" id="resumen2">$0.00</h2>
                            
                            <div class="mt-8 pt-6 border-t border-slate-50 dark:border-slate-800 flex justify-between items-center">
                                <span class="text-[10px] font-black uppercase text-slate-400">Rendimiento Neto</span>
                                <span class="text-xl font-black text-emerald-500" id="ganancia2">+$0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white dark:bg-darkCard rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
                    <div class="p-7 bg-slate-50/50 dark:bg-slate-800/20 border-b border-slate-100 dark:border-slate-800">
                        <h3 class="font-black text-[11px] uppercase tracking-[0.2em] text-slate-500">Proyección de Capitalización Mensual</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="text-[9px] font-black uppercase text-slate-400 border-b border-slate-50 dark:border-slate-800">
                                    <th class="p-5 text-left">Mes</th>
                                    <th class="p-5 text-right">E1 Balance</th>
                                    <th class="p-5 text-right">E1 Int.</th>
                                    <th class="p-5 text-right border-l border-slate-50 dark:border-slate-800">E2 Balance</th>
                                    <th class="p-5 text-right">E2 Int.</th>
                                </tr>
                            </thead>
                            <tbody id="tablaBody" class="divide-y divide-slate-50 dark:divide-slate-800/50">
                                </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        function adjust(id, amount) {
            const el = document.getElementById(id);
            let val = parseFloat(el.value) || 0;
            el.value = Math.max(0, val + amount);
            calcular();
        }

        function calcular() {
            const P = parseFloat(document.getElementById('montoInicial').value) || 0;
            const PMT = parseFloat(document.getElementById('aporteMensual').value) || 0;
            const rate1Anual = parseFloat(document.getElementById('interes1').value) / 100;
            const rate2Anual = parseFloat(document.getElementById('interes2').value) / 100;

            let b1 = P, b2 = P;
            let html = '';
            const fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 });
            
            const fechaInicioStr = document.getElementById('fechaInicio').value;
            const fechaFinStr = document.getElementById('fechaFin').value;
            
            if (!fechaInicioStr || !fechaFinStr) return;
            
            const fechaInicio = new Date(fechaInicioStr + 'T00:00:00');
            const fechaFin = new Date(fechaFinStr + 'T00:00:00');
            
            if (fechaInicio >= fechaFin) {
                document.getElementById('tablaBody').innerHTML = '<tr><td colspan="5" class="p-5 text-center text-slate-400 text-xs font-black">La fecha "Desde" debe ser menor a "Hasta".</td></tr>';
                document.getElementById('resumen1').innerText = "$0.00";
                document.getElementById('resumen2').innerText = "$0.00";
                document.getElementById('ganancia1').innerText = "+$0.00";
                document.getElementById('ganancia2').innerText = "+$0.00";
                return;
            }

            const mesesNombres = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
            let current = new Date(fechaInicio);
            let totalPMT = 0;

            while (current < fechaFin) {
                const year = current.getFullYear();
                const month = current.getMonth();
                const daysInYear = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0) ? 366 : 365;
                const nombreMes = `${mesesNombres[month]} ${year}`;

                const nextMonthStart = new Date(year, month + 1, 1);
                const stepEnd = nextMonthStart < fechaFin ? nextMonthStart : fechaFin;
                const daysInPeriod = Math.round((stepEnd - current) / (1000 * 60 * 60 * 24));
                
                const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
                const proporcionMes = daysInPeriod / totalDaysInMonth;
                const aporteProporcional = PMT * proporcionMes;

                let i1 = b1 * (rate1Anual / daysInYear) * daysInPeriod;
                let i2 = b2 * (rate2Anual / daysInYear) * daysInPeriod;
                
                b1 += i1 + aporteProporcional;
                b2 += i2 + aporteProporcional;
                totalPMT += aporteProporcional;

                html += `
                    <tr class="text-xs font-bold hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors group">
                        <td class="p-5 text-slate-400 font-black italic whitespace-nowrap">
                            ${nombreMes} <span class="text-[9px] opacity-60 font-normal ml-1">(${daysInPeriod}d)</span>
                        </td>
                        <td class="p-5 text-right font-black">${fmt.format(b1)}</td>
                        <td class="p-5 text-right text-blue-500/80 font-black">+${fmt.format(i1)}</td>
                        <td class="p-5 text-right font-black border-l border-slate-50 dark:border-slate-800">${fmt.format(b2)}</td>
                        <td class="p-5 text-right text-emerald-500/80 font-black">+${fmt.format(i2)}</td>
                    </tr>
                `;
                
                current = stepEnd;
            }

            document.getElementById('tablaBody').innerHTML = html;
            document.getElementById('resumen1').innerText = fmt.format(b1);
            document.getElementById('resumen2').innerText = fmt.format(b2);
            
            const totalInvertido = P + totalPMT;
            document.getElementById('ganancia1').innerText = `+${fmt.format(b1 - totalInvertido)}`;
            document.getElementById('ganancia2').innerText = `+${fmt.format(b2 - totalInvertido)}`;
        }

        // Auto-calculo
        ['montoInicial', 'aporteMensual', 'interes1', 'interes2', 'fechaInicio', 'fechaFin'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.addEventListener('input', calcular);
        });

        window.onload = () => {
            const hoy = new Date();
            const desde = hoy.toISOString().split('T')[0];
            const mesesDespues = new Date(hoy.getFullYear(), hoy.getMonth() + 7, hoy.getDate());
            const hasta = mesesDespues.toISOString().split('T')[0];
            
            document.getElementById('fechaInicio').value = desde;
            document.getElementById('fechaFin').value = hasta;
            
            calcular();
        };
    </script>
</body>
</html>
